system:
  pulsar:
    container: !system/component
      system/component-kind: pulsar/container
      exposed-ports: [6650, 8080]

    container-service-port: !system/component
      system/component-kind: pulsar/container-service-port
      container: !system/local-ref container
      exposed-port: 6650

    container-service-url: !system/component
      system/component-kind: pulsar/container-service-url
      port: !system/local-ref container-service-port
      scheme: pulsar

    container-service-http-port: !system/component
      system/component-kind: pulsar/container-service-http-port
      container: !system/local-ref container
      exposed-port: 8080

    container-service-http-url: !system/component
      system/component-kind: pulsar/container-service-http-url
      port: !system/local-ref container-service-http-port
      scheme: http

    client: !system/component
      system/component-kind: pulsar/client
      service-url: !system/local-ref container-service-url

    admin: !system/component
      system/component-kind: pulsar/admin
      service-http-url: !system/local-ref container-service-http-url

    schemas: !system/component
      system/component-kind: pulsar/schemas
      command:
        schema: schemas/command/command-envelope.avsc.json
        type: AVRO
      command-response:
        schema: schemas/command/command-response.avsc.json
        type: AVRO

    tenants: !system/component
      system/component-kind: pulsar/tenants
      admin: !system/local-ref admin
      tenants:
        - tenant: tenant-1
          clusters: [standalone]
          roles: []

    namespaces: !system/component
      system/component-kind: pulsar/namespaces
      _: !system/local-ref tenants
      admin: !system/local-ref admin
      namespaces:
        - namespace: "tenant-1/namespace-1"
          config:
            post:
              autoTopicCreation:
                allowAutoTopicCreation: false
                defaultNumPartitions: 1
                topicType: string
              isAllowAutoUpdateSchema: false
              schemaValidationEnforced: true
            put:
              schemaCompatibilityStrategy: FULL

    topics: !system/component
      system/component-kind: pulsar/topics
      _: !system/local-ref namespaces
      admin: !system/local-ref admin
      schemas: !system/local-ref schemas
      topics:
        - topic: "persistent://tenant-1/namespace-1/topic-cash-cash-accounts-command"
          partitions: 1
          schema: !keyword command
        - topic: "persistent://tenant-1/namespace-1/topic-cash-cash-accounts-command-response"
          partitions: 1
          schema: !keyword command-response
        - topic: "persistent://tenant-1/namespace-1/topic-parties-command"
          partitions: 1
          schema: !keyword command
        - topic: "persistent://tenant-1/namespace-1/topic-parties-command-response"
          partitions: 1
          schema: !keyword command-response
        - topic: "persistent://tenant-1/namespace-1/topic-transactions-command"
          partitions: 1
          schema: !keyword command
        - topic: "persistent://tenant-1/namespace-1/topic-transactions-command-response"
          partitions: 1
          schema: !keyword command-response
        - topic: "persistent://tenant-1/namespace-1/topic-payments-command"
          partitions: 1
          schema: !keyword command
        - topic: "persistent://tenant-1/namespace-1/topic-payments-command-response"
          partitions: 1
          schema: !keyword command-response
        - topic: "persistent://tenant-1/namespace-1/topic-interest-command"
          partitions: 1
          schema: !keyword command
        - topic: "persistent://tenant-1/namespace-1/topic-interest-command-response"
          partitions: 1
          schema: !keyword command-response

    producers: !system/component
      system/component-kind: pulsar/producers
      cash-accounts-command:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          accessMode: !pulsar/access-mode Shared
          schema: !keyword command
          topicName: "persistent://tenant-1/namespace-1/topic-cash-cash-accounts-command"
        schemas: !system/local-ref schemas
      cash-accounts-command-response:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          accessMode: !pulsar/access-mode Shared
          schema: !keyword command-response
          topicName: "persistent://tenant-1/namespace-1/topic-cash-cash-accounts-command-response"
        schemas: !system/local-ref schemas
      parties-command:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          accessMode: !pulsar/access-mode Shared
          schema: !keyword command
          topicName: "persistent://tenant-1/namespace-1/topic-parties-command"
        schemas: !system/local-ref schemas
      parties-command-response:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          accessMode: !pulsar/access-mode Shared
          schema: !keyword command-response
          topicName: "persistent://tenant-1/namespace-1/topic-parties-command-response"
        schemas: !system/local-ref schemas
      transactions-command:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          accessMode: !pulsar/access-mode Shared
          schema: !keyword command
          topicName: "persistent://tenant-1/namespace-1/topic-transactions-command"
        schemas: !system/local-ref schemas
      transactions-command-response:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          accessMode: !pulsar/access-mode Shared
          schema: !keyword command-response
          topicName: "persistent://tenant-1/namespace-1/topic-transactions-command-response"
        schemas: !system/local-ref schemas
      payments-command:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          accessMode: !pulsar/access-mode Shared
          schema: !keyword command
          topicName: "persistent://tenant-1/namespace-1/topic-payments-command"
        schemas: !system/local-ref schemas
      payments-command-response:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          accessMode: !pulsar/access-mode Shared
          schema: !keyword command-response
          topicName: "persistent://tenant-1/namespace-1/topic-payments-command-response"
        schemas: !system/local-ref schemas
      interest-command:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          accessMode: !pulsar/access-mode Shared
          schema: !keyword command
          topicName: "persistent://tenant-1/namespace-1/topic-interest-command"
        schemas: !system/local-ref schemas
      interest-command-response:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          accessMode: !pulsar/access-mode Shared
          schema: !keyword command-response
          topicName: "persistent://tenant-1/namespace-1/topic-interest-command-response"
        schemas: !system/local-ref schemas

    consumers: !system/component
      system/component-kind: pulsar/consumers
      cash-accounts-command:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          cryptoFailureAction: !pulsar/crypto-failure-action CONSUME
          schema: !pulsar/schema AUTO_CONSUME
          subscriptionName: bank-monolith-cash-accounts-command
          subscriptionType: !pulsar/subscription-type Shared
          topicNames:
            ["persistent://tenant-1/namespace-1/topic-cash-cash-accounts-command"]
        schemas: !system/local-ref schemas
      cash-accounts-command-response:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          cryptoFailureAction: !pulsar/crypto-failure-action CONSUME
          schema: !pulsar/schema AUTO_CONSUME
          subscriptionName: bank-monolith-cash-accounts-command-response
          subscriptionType: !pulsar/subscription-type Shared
          topicNames:
            ["persistent://tenant-1/namespace-1/topic-cash-cash-accounts-command-response"]
        schemas: !system/local-ref schemas
      parties-command:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          cryptoFailureAction: !pulsar/crypto-failure-action CONSUME
          schema: !pulsar/schema AUTO_CONSUME
          subscriptionName: bank-monolith-parties-command
          subscriptionType: !pulsar/subscription-type Shared
          topicNames:
            ["persistent://tenant-1/namespace-1/topic-parties-command"]
        schemas: !system/local-ref schemas
      parties-command-response:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          cryptoFailureAction: !pulsar/crypto-failure-action CONSUME
          schema: !pulsar/schema AUTO_CONSUME
          subscriptionName: bank-monolith-parties-command-response
          subscriptionType: !pulsar/subscription-type Shared
          topicNames:
            ["persistent://tenant-1/namespace-1/topic-parties-command-response"]
        schemas: !system/local-ref schemas
      transactions-command:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          cryptoFailureAction: !pulsar/crypto-failure-action CONSUME
          schema: !pulsar/schema AUTO_CONSUME
          subscriptionName: bank-monolith-transactions-command
          subscriptionType: !pulsar/subscription-type Shared
          topicNames:
            ["persistent://tenant-1/namespace-1/topic-transactions-command"]
        schemas: !system/local-ref schemas
      transactions-command-response:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          cryptoFailureAction: !pulsar/crypto-failure-action CONSUME
          schema: !pulsar/schema AUTO_CONSUME
          subscriptionName: bank-monolith-transactions-command-response
          subscriptionType: !pulsar/subscription-type Shared
          topicNames:
            ["persistent://tenant-1/namespace-1/topic-transactions-command-response"]
        schemas: !system/local-ref schemas
      payments-command:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          cryptoFailureAction: !pulsar/crypto-failure-action CONSUME
          schema: !pulsar/schema AUTO_CONSUME
          subscriptionName: bank-monolith-payments-command
          subscriptionType: !pulsar/subscription-type Shared
          topicNames:
            ["persistent://tenant-1/namespace-1/topic-payments-command"]
        schemas: !system/local-ref schemas
      payments-command-response:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          cryptoFailureAction: !pulsar/crypto-failure-action CONSUME
          schema: !pulsar/schema AUTO_CONSUME
          subscriptionName: bank-monolith-payments-command-response
          subscriptionType: !pulsar/subscription-type Shared
          topicNames:
            ["persistent://tenant-1/namespace-1/topic-payments-command-response"]
        schemas: !system/local-ref schemas
      interest-command:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          cryptoFailureAction: !pulsar/crypto-failure-action CONSUME
          schema: !pulsar/schema AUTO_CONSUME
          subscriptionName: bank-monolith-interest-command
          subscriptionType: !pulsar/subscription-type Shared
          topicNames:
            ["persistent://tenant-1/namespace-1/topic-interest-command"]
        schemas: !system/local-ref schemas
      interest-command-response:
        _: !system/local-ref topics
        client: !system/local-ref client
        conf:
          cryptoFailureAction: !pulsar/crypto-failure-action CONSUME
          schema: !pulsar/schema AUTO_CONSUME
          subscriptionName: bank-monolith-interest-command-response
          subscriptionType: !pulsar/subscription-type Shared
          topicNames:
            ["persistent://tenant-1/namespace-1/topic-interest-command-response"]
        schemas: !system/local-ref schemas

    message-bus-producers: !system/component
      system/component-kind: pulsar/message-bus-producers
      cash-accounts-command:
        producer: !system/local-ref producers.cash-accounts-command
      cash-accounts-command-response:
        producer: !system/local-ref producers.cash-accounts-command-response
      parties-command:
        producer: !system/local-ref producers.parties-command
      parties-command-response:
        producer: !system/local-ref producers.parties-command-response
      transactions-command:
        producer: !system/local-ref producers.transactions-command
      transactions-command-response:
        producer: !system/local-ref producers.transactions-command-response
      payments-command:
        producer: !system/local-ref producers.payments-command
      payments-command-response:
        producer: !system/local-ref producers.payments-command-response
      interest-command:
        producer: !system/local-ref producers.interest-command
      interest-command-response:
        producer: !system/local-ref producers.interest-command-response

    message-bus-consumers: !system/component
      system/component-kind: pulsar/message-bus-consumers
      cash-accounts-command:
        consumer: !system/local-ref consumers.cash-accounts-command
      cash-accounts-command-response:
        consumer: !system/local-ref consumers.cash-accounts-command-response
      parties-command:
        consumer: !system/local-ref consumers.parties-command
      parties-command-response:
        consumer: !system/local-ref consumers.parties-command-response
      transactions-command:
        consumer: !system/local-ref consumers.transactions-command
      transactions-command-response:
        consumer: !system/local-ref consumers.transactions-command-response
      payments-command:
        consumer: !system/local-ref consumers.payments-command
      payments-command-response:
        consumer: !system/local-ref consumers.payments-command-response
      interest-command:
        consumer: !system/local-ref consumers.interest-command
      interest-command-response:
        consumer: !system/local-ref consumers.interest-command-response

  message-bus:
    bus: !system/component
      system/component-kind: message-bus/bus
      producers: !system/ref pulsar.message-bus-producers
      consumers: !system/ref pulsar.message-bus-consumers

  fdb: !include bank/fdb-test.yml
  avro: !include avro/avro-test.yml
  cash-accounts: !include bank/cash-account-test.yml
  parties: !include bank/party-test.yml
  payments: !include bank/payment-test.yml
  interest: !include bank/interest-test.yml
  transactions: !include bank/transaction-test.yml
  idv: !include bank/idv-test.yml
  bootstrap: !include bank/bootstrap-internal-test.yml
  telemetry:
    otel-sdk: !profile
      dev: !system/component
        system/component-kind: telemetry/otel-sdk
        service-name: bank-monolith
        endpoint: http://localhost:4318/v1/traces
  server:
    handler: !system/required-component
    interceptors: !system/component
      system/component-kind: server/interceptors
      admin-api-key: !env MONO_ADMIN_API_KEY
      bootstrap: !system/ref bootstrap.internal
      dispatchers:
        cash-accounts: !system/ref cash-accounts.dispatcher
        parties: !system/ref parties.dispatcher
        payments: !system/ref payments.dispatcher
        interest: !system/ref interest.dispatcher
        transactions: !system/ref transactions.dispatcher
      avro: !system/ref avro.serde
      record-db: !system/ref fdb.record-db
      record-store: !system/ref fdb.store
    jetty-adapter: !system/component
      system/component-kind: server/jetty-adapter
      handler: !system/ref server.handler
      interceptors: !system/ref server.interceptors
      options: !profile
        dev:
          port: 8080

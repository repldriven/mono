syntax = "proto2";

package com.repldriven.mono.schemas.transactions;

import "record_metadata_options.proto";
import "schemas/balances/balance.proto";

option java_outer_classname = "TransactionProto";

enum TransactionStatus {
  TRANSACTION_STATUS_UNKNOWN  = 0;
  TRANSACTION_STATUS_PENDING  = 1;
  TRANSACTION_STATUS_POSTED   = 2;
  TRANSACTION_STATUS_FAILED   = 3;
  TRANSACTION_STATUS_REVERSED = 4;
}

enum TransactionType {
  TRANSACTION_TYPE_UNKNOWN            = 0;
  TRANSACTION_TYPE_INTERNAL_TRANSFER  = 1;
  TRANSACTION_TYPE_INBOUND_TRANSFER   = 2;
  TRANSACTION_TYPE_OUTBOUND_TRANSFER  = 3;
  TRANSACTION_TYPE_FEE                = 4;
  TRANSACTION_TYPE_INTEREST_ACCRUAL   = 5;
  TRANSACTION_TYPE_INTEREST_CAPITAL   = 6;
}

enum LegSide {
  LEG_SIDE_UNKNOWN = 0;
  LEG_SIDE_DEBIT   = 1;
  LEG_SIDE_CREDIT  = 2;
}

message Transaction {
  option (com.apple.foundationdb.record.record).usage = RECORD;

  required string            transaction_id    = 1 [(com.apple.foundationdb.record.field).primary_key = true];
  required string            idempotency_key   = 2;
  required TransactionStatus status            = 3;
  required TransactionType   transaction_type  = 4;
  required string            currency          = 5;  // ISO 4217
  required int64             created_at        = 6;
  required int64             updated_at        = 7;
  optional string            reference         = 8;  // human-readable memo
}

message TransactionLeg {
  option (com.apple.foundationdb.record.record).usage = RECORD;

  required string                                          leg_id         = 1;
  required string                                          transaction_id = 2;
  required string                                          account_id     = 3;
  required com.repldriven.mono.schemas.balances.Balance.BalanceType   balance_type   = 4;
  required com.repldriven.mono.schemas.balances.Balance.BalanceStatus balance_status = 5;
  required LegSide                                         side           = 6;
  required int64                                           amount         = 7;  // minor units, always > 0
  required string                                          currency       = 8;  // ISO 4217
  required int64                                           created_at     = 9;
}

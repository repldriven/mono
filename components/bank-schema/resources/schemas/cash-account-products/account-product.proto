syntax = "proto2";

package com.repldriven.mono.schemas.cash_account_products;

import "record_metadata_options.proto";
import "schemas/balances/balance.proto";

option java_outer_classname = "CashAccountProductProto";

message CashAccountProductVersion {
  option (com.apple.foundationdb.record.record).usage = RECORD;

  required string organization_id = 1;
  required string product_id = 2;
  required string version_id = 3;
  optional int32 version_number = 4;
  optional string status = 5;
  optional AccountType account_type = 6;
  optional BalanceSheetSide balance_sheet_side = 7;
  optional string valid_from = 8;
  optional string valid_to = 9;
  optional int64 created_at = 10;
  optional int64 updated_at = 11;
  optional string name = 12;
  repeated string allowed_currencies = 13;
  repeated com.repldriven.mono.schemas.balances.BalanceProduct balance_products = 14;

  enum AccountType {
    ACCOUNT_TYPE_UNKNOWN         = 0;
    ACCOUNT_TYPE_INTERNAL        = 1;
    ACCOUNT_TYPE_SETTLEMENT      = 2;
    ACCOUNT_TYPE_CURRENT         = 3;
    ACCOUNT_TYPE_SAVINGS         = 4;
    ACCOUNT_TYPE_TERM_DEPOSIT    = 5;
  }

  enum BalanceSheetSide {
    BALANCE_SHEET_SIDE_UNKNOWN = 0;
    BALANCE_SHEET_SIDE_ASSET = 1;
    BALANCE_SHEET_SIDE_LIABILITY = 2;
  }
}

syntax = "proto2";

package com.repldriven.mono.schemas.idv;

import "record_metadata_options.proto";

option java_outer_classname = "IdvProto";

message Idv {
  option (com.apple.foundationdb.record.record).usage = RECORD;

  required string organization_id = 7;
  required string verification_id = 1;
  required string party_id = 2;
  required IdvStatus status = 3;

  required int64 created_at = 4;
  optional int64 completed_at = 5;
  required int64 updated_at = 6;

  enum IdvStatus {
    IDV_STATUS_UNKNOWN = 0;
    PENDING = 1; // initiated, awaiting result
    IN_REVIEW = 2; // escalated to manual review
    ACCEPTED = 3;
    REJECTED = 4; // data doesn't pass checks
    FAILED = 5; // technical failure — can be retried
  }
}

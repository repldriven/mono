syntax = "proto2";

package com.repldriven.mono.schemas.party;

import "schemas/party/party.proto";

option java_outer_classname = "PartyChangelogProto";

message PartyChangelog {
  required string organization_id = 4;
  required string party_id = 1;
  optional Party.PartyStatus status_before = 2;
  required Party.PartyStatus status_after = 3;
}

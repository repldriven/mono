system:
  secret:
    provider: !system/component
      system/component-kind: secret/fixture-provider
      secrets:
        clearbank/api-key: test-clearbank-api-key
    env-provider: !system/component
      system/component-kind: secret/env-provider
      secret-map:
        # PATH is set in every process; the unset entry exercises the
        # distinct `:secret/env-not-set` anomaly path.
        test/path: PATH
        test/unset: QUEENSWOOD_DEFINITELY_UNSET_VAR

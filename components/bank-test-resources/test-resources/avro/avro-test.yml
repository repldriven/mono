serde: !system/component
  system/component-kind: avro/serde
  schemas:
    cash-account: schemas/cash-accounts/account.avsc.json
    open-cash-account: schemas/cash-accounts/open-account.avsc.json
    close-cash-account: schemas/cash-accounts/close-account.avsc.json
    get-cash-account: schemas/cash-accounts/get-account.avsc.json
    unknown-command: schemas/cash-accounts/close-account.avsc.json

    party: schemas/party/party.avsc.json
    create-party: schemas/party/create-party.avsc.json
    unknown-party-command: schemas/party/create-party.avsc.json

    idv: schemas/idv/idv.avsc.json
    initiate-idv: schemas/idv/initiate-idv.avsc.json
    get-idv: schemas/idv/get-idv.avsc.json
    unknown-idv-command: schemas/idv/initiate-idv.avsc.json

    transaction: schemas/transactions/transaction.avsc.json
    record-transaction: schemas/transactions/record-transaction.avsc.json
    unknown-transaction-command: schemas/transactions/record-transaction.avsc.json

    interest-result: schemas/interest/interest-result.avsc.json
    accrue-daily-interest: schemas/interest/accrue-daily-interest.avsc.json
    capitalize-monthly-interest: schemas/interest/capitalize-monthly-interest.avsc.json
    unknown-interest-command: schemas/interest/accrue-daily-interest.avsc.json

    internal-payment: schemas/payments/internal-payment.avsc.json
    submit-internal-payment: schemas/payments/submit-internal-payment.avsc.json
    unknown-payment-command: schemas/payments/submit-internal-payment.avsc.json

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest

    outputs:
      projects: ${{ steps.projects.outputs.matrix }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Discover projects
        id: projects
        run: |
          matrix=$(ls projects/ | jq -Rc '[., inputs]')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Discovered projects: $matrix"

  test:
    needs: discover
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.discover.outputs.projects) }}

    name: test (${{ matrix.project }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.5
        with:
          cli: latest

      - name: Setup Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.8'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install protoc-gen-clojure
        run: |
          sudo curl -L https://github.com/protojure/protoc-plugin/releases/latest/download/protoc-gen-clojure -o /usr/local/bin/protoc-gen-clojure
          sudo chmod +x /usr/local/bin/protoc-gen-clojure

      - name: Install FoundationDB client library and lcov
        run: |
          curl -LO https://github.com/apple/foundationdb/releases/download/7.3.75/foundationdb-clients_7.3.75-1_amd64.deb
          sudo dpkg -i foundationdb-clients_7.3.75-1_amd64.deb
          sudo apt-get install -y lcov
          sudo sed -i 's/lcov_branch_coverage/branch_coverage/' /etc/lcovrc

      - name: Verify Docker
        run: |
          docker --version
          docker ps

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clojure-${{ hashFiles('**/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Run tests
        env:
          MONO_ADMIN_API_KEY: ${{ secrets.MONO_ADMIN_API_KEY }}
          TESTCONTAINERS_REUSE_ENABLE: "true"
          COVERAGE: "true"
          COVERAGE_THRESHOLD: "50"
        run: |
          clojure -X:deps prep :aliases '[:dev :+example]'
          clojure -M:poly test project:${{ matrix.project }} :all

      - name: Publish test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Test Results (${{ matrix.project }})
          path: target/test-results/**/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.project }}
          path: target/test-results/**/*.xml
          retention-days: 7

      - name: Report coverage
        if: always()
        uses: zgosalvez/github-actions-report-lcov@v7.0.9
        with:
          coverage-files: target/coverage/${{ matrix.project }}/lcov.info
          minimum-coverage: 50
          github-token: ${{ secrets.GITHUB_TOKEN }}
          update-comment: true
          title-prefix: "[${{ matrix.project }}]"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ matrix.project }}
          path: target/coverage/${{ matrix.project }}/
          retention-days: 7

  # Gate job for branch protection — produces a single required check
  tests:
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Tests failed or were cancelled"
            exit 1
          fi
